packages:
  "framer-motion": "For smooth scroll animations and premium visual micro-interactions"
  "lucide-react": "For beautiful vector icons across services and features"

images:
  - path: "artifacts/portfolio/public/images/hero-bg.png"
    description: "Dark, abstract cybersecurity and programming theme. Deep black background with subtle glowing violet and purple neon grid lines, digital particles, and soft light leaks. Very clean, minimal, suitable for a dark-mode website hero background."
