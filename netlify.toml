[build]
  base              = "."
  command           = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/portfolio run build"
  publish           = "artifacts/portfolio/dist/public"

[build.environment]
  NODE_VERSION  = "24"
  PNPM_VERSION  = "10"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
